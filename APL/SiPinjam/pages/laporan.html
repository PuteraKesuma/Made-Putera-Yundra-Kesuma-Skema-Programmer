<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SiPinjam - Laporan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sb-title">SiPinjam</div>
      <div class="sb-sub">Sistem Peminjaman Alat Kantor</div>

      <div class="sb-user">
        <div class="row">
          <div>
            <div style="font-weight:800" id="sbUser">-</div>
            <div class="muted">Akun aktif</div>
          </div>
          <div id="sbRole" class="badge">-</div>
        </div>
        <div style="margin-top:10px">
          <button id="btnLogout" class="btn ghost small" style="width:100%">Keluar</button>
        </div>
      </div>

      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <div class="h1">Laporan Transaksi</div>
          <div class="muted">Admin/Petugas: lihat & export CSV</div>
        </div>
        <div class="actions">
          <input id="qLap" class="small" placeholder="Cari transaksi..." />
          <button id="btnCSV" class="btn primary small">Export CSV</button>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-head"><div style="font-weight:800">Data Transaksi</div></div>
        <div class="table-body">
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Peminjam</th><th>Alat</th><th>Jml</th>
                <th>Tgl Pinjam</th><th>J.Tempo</th><th>Tgl Kembali</th><th>Status</th>
              </tr>
            </thead>
            <tbody id="tbLap"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../db.js"></script>
  <script src="../models.js"></script>
  <script src="../app.js"></script>
  <script>
    App.initSeed();
    const s = App.requireAuth(['admin','petugas']);
    if (s){
      App.mountShell('laporan');
      App.renderLaporanPage();
    }
  </script>
</body>
</html>
